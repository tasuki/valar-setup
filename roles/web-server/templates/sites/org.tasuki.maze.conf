{% extends "https-site.conf" %}

{% set document_root_path = "/dist" %}

{% set server_name = "maze.tasuki.org" %}
{% set certificate_domain = "tasuki.org" %}

{% block site_settings %}
  RewriteEngine On

  RewriteCond %{DOCUMENT_ROOT}%{REQUEST_FILENAME} !-f
  RewriteRule .* %{DOCUMENT_ROOT}/index.html [L]
{% endblock %}
